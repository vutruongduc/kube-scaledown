replicaCount: 1

image:
  repository: ghcr.io/vutruongduc/kube-scaledown
  pullPolicy: IfNotPresent
  # Defaults to Chart.AppVersion when empty.
  tag: ""

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

leaderElect: true

nodeSelector: {}
tolerations: []
affinity: {}

# DownscaleSchedule configuration.
# Override these values in your cluster-specific values file.
#
# Example values file (e.g. kube-scaledown/values-<cluster>.yaml in your config repo):
#
#   schedule:
#     uptime: "Mon-Sat 08:00-20:00 Asia/Ho_Chi_Minh"
#     downtime: "Mon-Sat 20:00-08:00 Asia/Ho_Chi_Minh, Sun 00:00-24:00 Asia/Ho_Chi_Minh"
#     downtimeReplicas: 0
#     includeResources:
#       - deployments
#       - statefulsets
#       - fleets.agones.dev
#       - cronjobs
#     excludeNamespaces:
#       - kube-system
#       - argocd
#       - my-critical-namespace
#
# To exclude a single workload without editing this file:
#   kubectl annotate deployment <name> -n <ns> downscaler.sipher.gg/exclude=true
#
# Set enabled=false to skip creating the schedule (manage DownscaleSchedule manually).
schedule:
  enabled: true
  uptime: "Mon-Sat 08:00-20:00 UTC"
  downtimeReplicas: 0
  includeResources:
    - deployments
    - statefulsets
  excludeNamespaces:
    - kube-system

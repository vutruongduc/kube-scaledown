replicaCount: 1

image:
  repository: ghcr.io/vutruongduc/kube-scaledown
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

leaderElect: true

nodeSelector: {}
tolerations: []
affinity: {}

# Default working-hours DownscaleSchedule.
# Set schedule.enabled=false to skip creating it (manage schedules manually).
schedule:
  enabled: true
  uptime: "Mon-Sat 08:00-20:00 Asia/Ho_Chi_Minh"
  downtime: "Mon-Sat 20:00-08:00 Asia/Ho_Chi_Minh, Sun 00:00-24:00 Asia/Ho_Chi_Minh"
  downtimeReplicas: 0
  includeResources:
    - deployments
    - statefulsets
    - fleets.agones.dev
    - cronjobs
  excludeNamespaces:
    - kube-system
    - kube-downscaler
    - kube-scaledown-system
    - argocd
    - cert-manager
    - ingress-nginx
    - ingress-nginx-internal
    - monitoring
    - sipher-system
    - gatekeeper-system
    - aks-command
    - n8n
    - ather-os
    - unleash
    - nightshift
    - s2
    - pve-tool
    - trungthuy
  # Per-resource exclusions: annotate the resource directly instead.
  # kubectl annotate deployment <name> -n <ns> downscaler.sipher.gg/exclude=true

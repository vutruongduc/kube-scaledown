# This rule is not used by the project kube-scaledown itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to downscaler.sipher.gg resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kube-scaledown
    app.kubernetes.io/managed-by: kustomize
  name: downscaleschedule-viewer-role
rules:
- apiGroups:
  - downscaler.sipher.gg
  resources:
  - downscaleschedules
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - downscaler.sipher.gg
  resources:
  - downscaleschedules/status
  verbs:
  - get

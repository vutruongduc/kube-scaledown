# This rule is not used by the project kube-scaledown itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the downscaler.sipher.gg.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kube-scaledown
    app.kubernetes.io/managed-by: kustomize
  name: downscaleschedule-editor-role
rules:
- apiGroups:
  - downscaler.sipher.gg
  resources:
  - downscaleschedules
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - downscaler.sipher.gg
  resources:
  - downscaleschedules/status
  verbs:
  - get
